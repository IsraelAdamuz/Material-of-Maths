<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths 2º ESO - Practice Algebra</title>
    <script defer src="https://unpkg.com/mathlive@0.98.6/dist/mathlive.min.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --bg: #ecf0f1;
            --surface: #ffffff;
            --success: #27ae60;
            --error: #c0392b;
            --key-num: #f8f9fa;
            --key-func: #e9ecef;
            --key-action: #dceefb;
            --border: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        .author-text { text-align: center; font-style: italic; color: #666; margin-top: 0; margin-bottom: 25px; font-size: 0.95rem; }
        
        .app-container {
            background: var(--surface);
            width: 100%;
            max-width: 900px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px;
            box-sizing: border-box;
        }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn {
            background: transparent; border: 2px solid var(--primary); color: var(--primary);
            padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        .tab-btn.active, .tab-btn:hover { background: var(--primary); color: white; }

        .problem-area {
            text-align: center; background: #edf2f7; border-radius: 12px;
            padding: 20px; margin-bottom: 20px; border: 1px solid #dce4ec;
        }
        .problem-statement { font-size: 1.2rem; color: #555; margin-bottom: 10px; }
        .math-display { font-size: 2.2rem; margin: 10px 0; min-height: 50px; }

        math-field {
            font-size: 2rem; padding: 15px; border: 2px solid #dce4ec;
            border-radius: 10px; width: 100%; background: #fff; margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);
            /* --- DESACTIVAR MENÚ CONTEXTUAL NATIVO --- */
            -webkit-touch-callout: none;
            -webkit-user-select: text;
            -khtml-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
            /* ------------------------------------------- */
        }
        math-field:focus-within { border-color: var(--primary); outline: none; }
        math-field::part(virtual-keyboard-toggle) { display: none; }

        .keyboard-wrapper {
            background: #f0f3f5; padding: 15px; border-radius: 12px; border: 1px solid #dce4ec;
        }
        .keyboard-grid {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; user-select: none;
        }
        .key {
            height: 50px; border: 1px solid var(--border); border-radius: 6px;
            font-size: 1.2rem; cursor: pointer; background: var(--key-func);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 2px 0 #aab0b5; transition: transform 0.1s;
            font-family: 'Cambria Math', serif; color: #333;
        }
        .key:active { transform: translateY(2px); box-shadow: none; }
        .key-num { background: var(--key-num); font-family: sans-serif; font-weight: 600; color: #2c3e50; }
        .key-action { background: var(--key-action); color: var(--primary); border-color: #aed6f1; font-weight: bold; }
        .key-del { background: #ffdada; color: #c0392b; border-color: #ffbabb; }
        
        .frac-icon { display: flex; flex-direction: column; align-items: center; font-size: 0.7em; line-height: 1; }
        .frac-line { width: 12px; height: 1px; background: currentColor; margin: 2px 0; }
        .box { width: 8px; height: 8px; border: 1px dashed currentColor; }

        .action-area { display: flex; gap: 15px; margin-top: 20px; }
        .btn-main {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .btn-check { background-color: var(--success); }
        .btn-next { background-color: var(--primary); }
        
        #feedback { margin-top: 20px; text-align: center; padding: 15px; border-radius: 8px; font-size: 1.1rem; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        @media (max-width: 768px) {
            .keyboard-grid { grid-template-columns: repeat(8, 1fr); }
            .hide-mobile { display: none; }
        }
        @media (max-width: 500px) {
            .keyboard-grid { grid-template-columns: repeat(5, 1fr); }
            .key { height: 45px; font-size: 1rem; }
            .btn-check { display: none; }
            .key-enter-mobile { grid-column: span 2; background: var(--success); color: white; }
        }
        @media (min-width: 501px) { .key-enter-mobile { display: none; } }
    </style>
</head>
<body>

    <h1>Maths 2º ESO - Practice Algebra</h1>
    <p class="author-text">(Material creado por Israel Adamuz)</p>
    
    <div class="app-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="setMode('notables')">Identidades notables</button>
            <button class="tab-btn" onclick="setMode('factor_comun')">Extraer factor común</button>
        </div>

        <div class="problem-area">
            <div class="problem-statement" id="stmt">Cargando...</div>
            <div class="math-display" id="render"></div>
        </div>

        <math-field id="mf" virtual-keyboard-mode="manual" placeholder="Escribe tu respuesta..."></math-field>

        <div class="keyboard-wrapper">
            <div class="keyboard-grid">
                <button class="key key-num" onmousedown="event.preventDefault(); typeT('7')">7</button>
                <button class="key key-num" onmousedown="event.preventDefault(); typeT('8')">8</button>
                <button class="key key-num" onmousedown="event.preventDefault(); typeT('9')">9</button>
                <button class="key" onmousedown="event.preventDefault(); typeT('x')">𝑥</button>
                <button class="key" onmousedown="event.preventDefault(); typeT('y')">𝑦</button>
                <button class="key" onmousedown="event.preventDefault(); typeT('z')">𝑧</button>
                <button class="key" onmousedown="event.preventDefault(); typeT('^2')">□²</button>
                <button class="key" onmousedown="event.preventDefault(); cmd('superscript')">□ⁿ</button>
                <button class="key hide-mobile" onmousedown="event.preventDefault(); typeT('(')">(</button>
                <button class="key hide-mobile" onmousedown="event.preventDefault(); typeT(')')">)</button>

                <button class="key key-num" onmousedown="event.preventDefault(); typeT('4')">4</button>
                <button class="key key-num" onmousedown="event.preventDefault(); typeT('5')">5</button>
                <button class="key key-num" onmousedown="event.preventDefault(); typeT('6')">6</button>
                <button class="key" onmousedown="event.preventDefault(); typeT('+')">+</button>
                <button class="key" onmousedown="event.preventDefault(); typeT('-')">−</button>
                
                <button class="key key-action" onmousedown="event.preventDefault(); cmd('frac')">
                    <div class="frac-icon"><div class="box"></div><div class="frac-line"></div><div class="box"></div></div>
                </button>
                
                <button class="key hide-mobile" onmousedown="event.preventDefault(); typeT('a')">𝑎</button>
                <button class="key hide-mobile" onmousedown="event.preventDefault(); typeT('b')">𝑏</button>
                <button class="key hide-mobile" onmousedown="event.preventDefault(); typeT('*')">·</button>
                <button class="key key-del" style="grid-column: span 1" onmousedown="event.preventDefault(); cmd('deleteBackward')">⌫</button>

                <button class="key key-num" onmousedown="event.preventDefault(); typeT('1')">1</button>
                <button class="key key-num" onmousedown="event.preventDefault(); typeT('2')">2</button>
                <button class="key key-num" onmousedown="event.preventDefault(); typeT('3')">3</button>
                <button class="key key-num" onmousedown="event.preventDefault(); typeT('0')">0</button>
                <button class="key" onmousedown="event.preventDefault(); typeT('*')">×</button>
                
                <button class="key key-action" style="grid-column: span 2" onmousedown="event.preventDefault(); cmd('moveToPreviousChar')">← Atrás</button>
                <button class="key key-action" style="grid-column: span 2" onmousedown="event.preventDefault(); cmd('moveToNextChar')">Adelante →</button>
                
                <button class="key key-enter-mobile" onclick="check()">Comprobar</button>
            </div>
        </div>

        <div class="action-area">
            <button class="btn-main btn-check" onclick="check()">Comprobar Respuesta</button>
            <button class="btn-main btn-next" onclick="gen()">Siguiente Ejercicio</button>
        </div>

        <div id="feedback"></div>
    </div>

    <script>
        let mf, render, feedback, stmt;
        let mode = 'notables';
        let answer = '';

        window.addEventListener('load', () => {
            mf = document.getElementById('mf');
            render = document.getElementById('render');
            feedback = document.getElementById('feedback');
            stmt = document.getElementById('stmt');
            
            // --- DESACTIVAR MENÚ CONTEXTUAL DE MATHLIVE ---
            // Y evitar el menú contextual nativo del navegador
            mf.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
            mf.addEventListener('contextmenushow', (e) => { e.preventDefault(); return false; });
            // ----------------------------------------------
            
            if (customElements.get('math-field')) {
                gen();
                mf.focus();
                mf.mathVirtualKeyboardPolicy = "manual"; 
                mf.addEventListener('keydown', (e) => { if (e.key === 'Enter') check(); });
            } else {
                stmt.textContent = "Error de carga.";
            }
        });

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            gen();
            mf.focus();
        }

        function typeT(txt) { mf.executeCommand(['insert', txt]); mf.focus(); }
        
        function cmd(c) {
            switch(c) {
                case 'frac': mf.executeCommand(['insert', '\\frac{#0}{#1}']); break;
                case 'superscript': mf.executeCommand('moveToSuperscript'); break;
                default: mf.executeCommand(c);
            }
            mf.focus();
        }

        // --- Matemáticas ---
        function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

        function fmtCoef(n, variablePart = '') {
            if (n === 0) return ''; 
            if (variablePart === '') return n.toString();
            if (n === 1) return variablePart;
            if (n === -1) return '-' + variablePart;
            return n + variablePart;
        }

        function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function gen() {
            feedback.textContent = ''; feedback.className = '';
            let problem = '';
            
            if (mode === 'notables') {
                stmt.textContent = "Desarrolla la identidad:";
                let type = rnd(1, 4); // 1: Simple, 2: Exponentes, 3: Fraccion, 4: Dos variables
                let op = rnd(1, 3); // 1: (a+b)^2, 2: (a-b)^2, 3: (a+b)(a-b)
                
                let t1, t2, res1, res2, res3;

                if (type === 1) { 
                    let a = rnd(1, 4); let b = rnd(1, 6);
                    t1 = fmtCoef(a, 'x'); t2 = b.toString();
                    res1 = fmtCoef(a*a, 'x^2'); res2 = fmtCoef(2*a*b, 'x'); res3 = (b*b).toString();
                } else if (type === 2) { 
                    let a = rnd(1, 3); let b = rnd(1, 4); let p = rnd(2, 3);
                    t1 = fmtCoef(a, `x^${p}`); t2 = b.toString();
                    res1 = fmtCoef(a*a, `x^${2*p}`); res2 = fmtCoef(2*a*b, `x^${p}`); res3 = (b*b).toString();
                } else if (type === 3) { 
                    let den = rnd(2, 4); let b = rnd(1, 4);
                    t1 = `\\frac{1}{${den}}x`; t2 = b.toString();
                    res1 = `\\frac{1}{${den*den}}x^2`;
                    let midNum = 2 * b; let midDen = den;
                    let common = gcd(midNum, midDen);
                    midNum /= common; midDen /= common;
                    res2 = (midDen === 1) ? fmtCoef(midNum, 'x') : `\\frac{${midNum}}{${midDen}}x`;
                    res3 = (b*b).toString();
                } else { 
                    let a = rnd(1, 3); let b = rnd(1, 3);
                    t1 = fmtCoef(a, 'x'); t2 = fmtCoef(b, 'y');
                    res1 = fmtCoef(a*a, 'x^2'); res2 = fmtCoef(2*a*b, 'xy'); res3 = fmtCoef(b*b, 'y^2');
                }

                if (op === 1) {
                    problem = `(${t1} + ${t2})^2`;
                    answer = `${res1} + ${res2} + ${res3}`;
                } else if (op === 2) {
                    problem = `(${t1} - ${t2})^2`;
                    answer = `${res1} - ${res2} + ${res3}`;
                } else {
                    problem = `(${t1} + ${t2})(${t1} - ${t2})`;
                    answer = `${res1} - ${res3}`;
                }
                mf.setValue('');

            } else if (mode === 'factor_comun') {
                stmt.textContent = "Extrae factor común:";
                
                // --- GENERADOR MEJORADO DE POLINOMIOS COMPLEJOS (3 a 5 TÉRMINOS) ---
                
                // Decidir número de términos (mínimo 3, hasta 5 o 6)
                let numTerms = rnd(3, 5); // 3, 4, o 5 términos
                
                // Funciones auxiliares para gestionar variables y sus potencias
                function varsToLatexObj(varsObj) {
                    let latex = "";
                    let keys = Object.keys(varsObj).sort(); // Asegurar orden x before y before z
                    for (let key of keys) {
                        if (varsObj[key] === 0) continue;
                        if (varsObj[key] === 1) latex += key;
                        else latex += `${key}^${varsObj[key]}`;
                    }
                    return latex;
                }

                function parseFactorObj() {
                    let numericFactor, varsObj = {};
                    let factorType = rnd(1, 4); 
                    // 1: Solo número, 2: Solo var simple, 3: Núm+var simple, 4: Núm+var complejas
                    if (factorType === 1) { numericFactor = rnd(2, 6); } 
                    else if (factorType === 2) { numericFactor = 1; if (rnd(0,1)) varsObj['x'] = 1; else varsObj['y'] = 1; }
                    else if (factorType === 3) { numericFactor = rnd(2, 5); if (rnd(0,1)) varsObj['x'] = 1; else varsObj['y'] = 1; }
                    else { 
                        numericFactor = rnd(2, 4);
                        let complexVarType = rnd(1, 5); // xy, x^2, y^2, xy^2, x^2y
                        if (complexVarType === 1) { varsObj['x'] = 1; varsObj['y'] = 1; }
                        else if (complexVarType === 2) { varsObj['x'] = 2; }
                        else if (complexVarType === 3) { varsObj['y'] = 2; }
                        else if (complexVarType === 4) { varsObj['x'] = 1; varsObj['y'] = 2; }
                        else { varsObj['x'] = 2; varsObj['y'] = 1; }
                    }
                    return { numeric: numericFactor, vars: varsObj };
                }

                // 1. Decidir el factor común
                let factorDef = parseFactorObj(); 
                let c_f = factorDef.numeric;
                let vars_f_obj = factorDef.vars;
                let vars_f_latex = varsToLatexObj(vars_f_obj);
                
                // 2. Construir coefs y vars "limpios" adicionales para cada término
                // Asegurar gcd(coefs_a_i) = 1.
                // Asegurar intersección(vars_a_i_objs_clean) = {}.

                let coefs_a = [];
                for (let i = 0; i < numTerms; i++) coefs_a.push(rnd(1, 3)); // Coefs pequeños adicionales
                
                // Forzar gcd=1: el primer coef_a_0 = 1, es el más simple.
                coefs_a[0] = 1; 

                // Construir vars_a_objs_clean con intersección vacía {}.
                let vars_a_objs_clean = [];
                let extraVarsPoolClean = ['x', 'y', 'z', '']; // Pool para asegurar intersección vacía
                
                // Término 0 y Término 1: variables exclusivas
                vars_a_objs_clean.push({[extraVarsPoolClean[0]]: 1}); // Término 0: solo x
                vars_a_objs_clean.push({[extraVarsPoolClean[1]]: 1}); // Término 1: solo y
                
                // Término 2: variable exclusiva o sin variable
                if (numTerms > 2) {
                    if (extraVarsPoolClean[2]) vars_a_objs_clean.push({[extraVarsPoolClean[2]]: 1}); // Término 2: solo z
                    else vars_a_objs_clean.push({}); // Término 2: sin variable
                }

                // Resto de términos: variables aleatorias del pool expandido (incluyendo cadena vacía)
                let expandedVarsPool = ['x', 'y', 'z', 'x^2', 'y^2', '']; // Cadena vacía para sin variables adicionales
                for (let i = 3; i < numTerms; i++) {
                    let termVarsObj = {};
                    let varLatex = expandedVarsPool[rnd(0, expandedVarsPool.length - 1)];
                    if (varLatex === 'x') termVarsObj['x'] = 1;
                    else if (varLatex === 'y') termVarsObj['y'] = 1;
                    else if (varLatex === 'z') termVarsObj['z'] = 1;
                    else if (varLatex === 'x^2') termVarsObj['x'] = 2;
                    else if (varLatex === 'y^2') termVarsObj['y'] = 2;
                    // Dejar vacío para ""
                    vars_a_objs_clean.push(termVarsObj);
                }
                
                // 3. Construir los monomios finales: (c_f * coefs_a_i, vars_f_obj + vars_a_i_objs_clean)
                let finalTermsLatex = [];
                let finalTermsLatexInside = []; // Para el interior del paréntesis
                
                // Factor común latex: c_f * vars_f_latex
                // El coef del factor común es fmtCoef(c_f) pero para el factor, c_f=1 es fmtCoef("") -> ""
                let finalFactorLatex = (c_f === 1 ? "" : c_f) + vars_f_latex;
                
                for (let i = 0; i < numTerms; i++) {
                    let finalCoef = c_f * coefs_a[i];
                    let finalVarsObj = {...vars_f_obj}; // Copiar factor vars
                    // Añadir variables adicionales "limpias"
                    for (let key in vars_a_objs_clean[i]) {
                        if (finalVarsObj[key]) finalVarsObj[key] += vars_a_objs_clean[i][key];
                        else finalVarsObj[key] = vars_a_objs_clean[i][key];
                    }
                    
                    finalTermsLatex.push(fmtCoef(finalCoef, varsToLatexObj(finalVarsObj)));
                    finalTermsLatexInside.push(fmtCoef(coefs_a[i], varsToLatexObj(vars_a_objs_clean[i])));
                }
                
                // Unir los términos con signos aleatorios
                let problemLatex = "";
                let insideLatex = "";
                for (let i = 0; i < numTerms; i++) {
                    let sign = (i === 0 || Math.random() > 0.5) ? "" : "-";
                    if (i > 0 && sign === "") sign = "+";
                    
                    problemLatex += sign + finalTermsLatex[i] + " ";
                    insideLatex += sign + finalTermsLatexInside[i] + " ";
                }
                // Limpiar espacios extra
                problemLatex = problemLatex.trim();
                insideLatex = insideLatex.trim();
                
                // Si el primer término tiene signo +, quitarlo
                if (problemLatex.startsWith("+")) problemLatex = problemLatex.substring(1).trim();
                if (insideLatex.startsWith("+")) insideLatex = insideLatex.substring(1).trim();
                
                problem = problemLatex;
                answer = `${finalFactorLatex} \\cdot (${insideLatex})`;
                
                // Cajetines predefinidos interactivos
                mf.setValue('\\placeholder{} \\cdot (\\placeholder{})');
                
                // -------------------------------------------------------------------------
            }

            render.innerHTML = `$$${problem}$$`;
            if (window.MathLive) MathLive.renderMathInElement(render);
        }

        // --- Verificación Flexible ---
        function check() {
            if(!answer) return;
            let val = mf.getValue();
            
            // 1. Normalización básica
            let userNorm = normalizeStructure(val);
            let ansNorm = normalizeStructure(answer);

            // 2. Reducción de fracciones (Solo para notables)
            let userReduced = simplifyFractionsInString(userNorm);
            let ansReduced = simplifyFractionsInString(ansNorm);

            // 3. Ordenamiento (Solo para notables, para factor común complejizados el orden dentro del paréntesis es aleatorio y complejo de normalizar sin un parser real.
            // Es un compromiso aceptable para el ejercicio de 2º ESO si el orden del generador es lógico.)
            if (mode === 'notables') {
                userReduced = sortTerms(userReduced);
                ansReduced = sortTerms(ansReduced);
            }

            // 4. Comparación
            let isOk = false;
            
            // Para notables, la validación normalizada funciona bien.
            if (mode === 'notables') {
                if (userReduced === ansReduced) isOk = true;
            } else if (mode === 'factor_comun') {
                // Para factor común complejizados, la comparación directa de cadenas normalizadas es estricta sobre el orden del paréntesis.
                // Es un compromiso aceptable para el ejercicio de 2º ESO si el orden del generador es lógico (variables exclusivas primero (x, y, z), resto aleatorio). 
                
                if (userReduced === ansReduced) isOk = true;
            }

            if(isOk) {
                feedback.innerHTML = "¡Correcto! 🎉";
                feedback.className = "correct";
            } else {
                feedback.innerHTML = `Incorrecto. <br>Solución esperada: $$${answer}$$`;
                feedback.className = "incorrect";
                MathLive.renderMathInElement(feedback);
            }
        }

        function normalizeStructure(latex) {
            let s = latex;
            // Eliminar espacios y comandos visuales. IMPORTANTE: eliminamos \cdot para agnósticidad (ej: 2x(x+1) == 2x \cdot (x+1))
            s = s.replace(/\\left|\\right|\\displaystyle|\\text\{.*?\}|\s+|\\,|\\:|\\;|\\!/g, '');
            s = s.replace(/\\cdot/g, ''); 
            s = s.replace(/\\frac\{(\d+)([a-zA-Z](?:\^\{?\d+\}?)?)\}\{(\d+)\}/g, '\\frac{$1}{$3}$2');
            s = s.replace(/\\frac\{([a-zA-Z](?:\^\{?\d+\}?)?)\}\{(\d+)\}/g, '\\frac{1}{$2}$1');
            s = s.replace(/\^\{(\d+)\}/g, '^$1');
            // Limpiar cajetines vacíos si se dejaran
            s = s.replace(/\\placeholder\[.*?\]\{.*?\}/g, '');
            s = s.replace(/\\placeholder\{.*?\}/g, '');
            s = s.replace(/\\placeholder/g, '');
            return s;
        }

        function simplifyFractionsInString(latex) {
            return latex.replace(/\\frac\{(\d+)\}\{(\d+)\}/g, (match, n, d) => {
                const num = parseInt(n, 10);
                const den = parseInt(d, 10);
                const divisor = gcd(num, den);
                return `\\frac{${num/divisor}}{${den/divisor}}`;
            });
        }

        function sortTerms(latex) {
            if (!latex) return latex;
            let str = latex;
            if (!str.startsWith('+') && !str.startsWith('-')) str = '+' + str;

            let terms = [];
            let currentTerm = "";
            let depth = 0; 

            for (let i = 0; i < str.length; i++) {
                let char = str[i];
                if (char === '{') depth++;
                if (char === '}') depth--;

                if (depth === 0 && (char === '+' || char === '-')) {
                    if (currentTerm.length > 0) terms.push(currentTerm);
                    currentTerm = char;
                } else {
                    currentTerm += char;
                }
            }
            if (currentTerm.length > 0) terms.push(currentTerm);
            terms.sort();
            return terms.join('');
        }
    </script>
